<!DOCTYPE html>
<html>
<head>
    <title>Process AI Chat</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #chat { width: 100%; max-width: 600px; height: 80vh; background: white; display: flex; flex-direction: column; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; line-height: 1.5; }
        .bot { background: #e3f2fd; align-self: flex-start; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; width: fit-content; }
        #in { display: flex; padding: 20px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat">
        <div id="msgs">
            <div class="msg bot">Hello! Describe your process (e.g., "Km 5, Tm 10, Tow 3") or tell me a story about your plant.</div>
        </div>
        <div id="in">
            <input type="text" id="userInput" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value; if(!text) return;
            addMsg(text, 'user'); input.value = '';
            const res = await fetch('/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });
            const data = await res.json();
            addMsg(data.response, 'bot');
        }
        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`; d.innerHTML = t;
            const m = document.getElementById('msgs');
            m.appendChild(d); m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
