<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process AI Expert</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app-container { width: 100%; max-width: 650px; background: white; margin: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        header { background: #007bff; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: #fcfcfc; }
        .msg { margin-bottom: 15px; padding: 15px; border-radius: 12px; max-width: 85%; line-height: 1.6; font-size: 15px; animation: slideUp 0.3s ease; }
        .bot { background: #f1f3f4; align-self: flex-start; color: #333; border: 1px solid #e0e0e0; }
        .user { background: #007bff; color: white; align-self: flex-end; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
        #input-area { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none; font-size: 15px; }
        button { background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover { background: #0056b3; }
        #reset-btn { background: #ff4757; font-size: 12px; padding: 8px 15px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        b { color: #007bff; }
        .user b { color: #fff; }
    </style>
</head>
<body>
    <div id="app-container">
        <header>
            <span><b>Process AI</b> Expert</span>
            <button id="reset-btn" onclick="resetChat()">Reset Plant</button>
        </header>
        <div id="chat-window">
            <div class="msg bot">Hello! I'm your Process Consultant. Tell me about your plant gain (Km), lag (Tm), and delay (Tau), or just describe what you need!</div>
        </div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        
        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;
            
            addMsg(text, 'user');
            input.value = '';

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });
            const data = await response.json();
            addMsg(data.response, 'bot');
        }

        async function resetChat() {
            await fetch('/api/reset', {method: 'POST'});
            chatWindow.innerHTML = '';
            addMsg("Memory cleared! Let's start with a new process. What are your parameters?", 'bot');
        }

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
