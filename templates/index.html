<!DOCTYPE html>
<html>
<head><title>AI Tuner</title></head>
<body style="font-family: Arial; padding: 20px; background: #f4f4f4;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px;">
        <h2>Process Control AI</h2>
        <input type="text" id="req" placeholder="E.g., I want a smooth response..." style="width: 100%; padding: 10px; margin-bottom: 10px;"><br>
        <input type="number" id="km" placeholder="Km" style="width: 30%; padding: 10px;">
        <input type="number" id="tm" placeholder="Tm" style="width: 30%; padding: 10px;">
        <input type="number" id="taum" placeholder="Tau_m" style="width: 30%; padding: 10px;">
        <button onclick="analyze()" style="padding: 10px 20px; margin-top: 10px; background: #007bff; color: white; border: none;">Analyze</button>
        <div id="output" style="margin-top: 20px; line-height: 1.5;"></div>
    </div>
    <script>
        async function analyze() {
            const data = {
                text: document.getElementById('req').value,
                km: document.getElementById('km').value,
                tm: document.getElementById('tm').value,
                taum: document.getElementById('taum').value
            };
            document.getElementById('output').innerHTML = "<i>AI is thinking...</i>";
            const res = await fetch('/api/analyze', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
            const result = await res.json();
            document.getElementById('output').innerHTML = result.explanation;
        }
    </script>
</body>
</html>
