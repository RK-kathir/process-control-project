<!DOCTYPE html>
<html>
<head>
    <title>Process AI Expert</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 650px; height: 95vh; background: white; margin: 15px; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        #chat { flex: 1; overflow-y: auto; padding: 25px; }
        .msg { margin-bottom: 20px; padding: 15px; border-radius: 15px; line-height: 1.6; max-width: 85%; }
        .bot { background: #f0f2f5; align-self: flex-start; border: 1px solid #e0e0e0; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        #input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div id="chat">
            <div class="msg bot">Hello! I'm your AI Process Consultant. Please provide your <b>Km</b>, <b>Tm</b>, and <b>Tau</b> values.</div>
        </div>
        <div id="input-area">
            <input type="text" id="userIn" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('userIn');
            const text = input.value; if(!text) return;
            addMsg(text, 'user'); input.value = '';
            const res = await fetch('/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });
            const data = await res.json();
            const botDiv = addMsg(data.response, 'bot');
            if(data.chart) {
                const chartDiv = document.createElement('div');
                chartDiv.id = 'plot-' + Date.now();
                botDiv.appendChild(chartDiv);
                Plotly.newPlot(chartDiv.id, JSON.parse(data.chart).data, JSON.parse(data.chart).layout);
            }
        }
        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`; d.innerHTML = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
