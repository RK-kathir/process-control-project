<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Dwyer SLM | Process Control</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #2563eb; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 5px 0 0 0; color: #6b7280; font-size: 13px; font-weight: 500; }
        
        .chat-container { width: 95%; max-width: 800px; background: #ffffff; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); display: flex; flex-direction: column; height: 75vh; overflow: hidden; }
        .chat-log { flex-grow: 1; overflow-y: auto; padding: 25px; background: #ffffff; font-size: 14px; line-height: 1.6; }
        
        .bot-msg { background-color: #f3f4f6; color: #1f2937; padding: 15px 20px; border-radius: 0px 16px 16px 16px; margin-bottom: 20px; max-width: 85%; align-self: flex-start; }
        .user-msg { background-color: #2563eb; color: #ffffff; padding: 12px 20px; border-radius: 16px 0px 16px 16px; margin-bottom: 20px; max-width: 80%; align-self: flex-end; margin-left: auto; }
        
        .ai-label { font-weight: bold; color: #2563eb; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .rules-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }
        .rule-card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .rule-title { font-weight: bold; color: #111827; font-size: 15px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 10px; }
        .adv-text { color: #059669; font-size: 13px; margin: 8px 0; }
        .dis-text { color: #dc2626; font-size: 13px; margin: 8px 0; }
        
        .select-btn { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .select-btn:hover { background: #1d4ed8; }

        .math-box { font-family: "Courier New", Courier, monospace; background: #1f2937; color: #10b981; padding: 15px; border-radius: 6px; margin-top: 10px; font-size: 13px;}
        .insight-box { background: #e0f2fe; border-left: 4px solid #0284c7; padding: 12px; margin-top: 15px; border-radius: 4px; font-size: 13.5px; color: #0369a1; }

        .input-area { display: flex; padding: 20px; background: #f9fafb; border-top: 1px solid #e5e7eb; gap: 12px; }
        input { flex-grow: 1; padding: 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #ffffff; color: #111827; font-size: 15px; transition: border 0.3s; }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        button#submit-btn { padding: 0 25px; background: #2563eb; color: white; font-weight: bold; font-size: 15px; cursor: pointer; border: none; border-radius: 8px; transition: background 0.2s; }
        button#submit-btn:hover { background: #1d4ed8; }
        
        .footer { margin-top: 15px; font-size: 11px; color: #9ca3af; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <h1>O'Dwyer AI Model</h1>
    <p>FOLPD NEURO-SYMBOLIC CHATBOT</p>
</div>

<div class="chat-container">
    <div class="chat-log" id="chatLog"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Message the AI..." onkeypress="handleEnter(event)" autocomplete="off">
        <button id="submit-btn" onclick="handleUserInput()">Send</button>
    </div>
</div>

<div class="footer">
    DEVELOPED FOR INDUSTRIAL PROCESS CONTROL BY KATHIRVEL R
</div>

<script>
    const chatLog = document.getElementById('chatLog');
    const userInput = document.getElementById('userInput');
    
    let currentState = 'ASK_KM';
    let processData = { km: null, tm: null, taum: null };

    setTimeout(() => {
        addBotMessage("System initialized. Comprehensive O'Dwyer FOLPD dataset loaded.<br><br>To calculate the L/Tau ratio and dynamically suggest PI/PID tuning rules, please enter the Process Gain (K_m):");
    }, 500);

    function addBotMessage(msg) {
        chatLog.innerHTML += `<div class="bot-msg"><div class="ai-label">AI Assistant</div>${msg}</div>`;
        scrollToBottom();
    }

    function addUserMessage(msg) {
        chatLog.innerHTML += `<div class="user-msg">${msg}</div>`;
        scrollToBottom();
    }

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function handleEnter(e) {
        if (e.key === 'Enter') handleUserInput();
    }

    async function handleUserInput() {
        const input = userInput.value.trim();
        if (!input) return;
        
        addUserMessage(input);
        userInput.value = '';

        if (currentState === 'ASK_KM') {
            processData.km = input;
            addBotMessage(`Recorded K_m = ${input}.<br>Next, enter the Time Constant (T_m) in seconds:`);
            currentState = 'ASK_TM';
        } 
        else if (currentState === 'ASK_TM') {
            processData.tm = input;
            addBotMessage(`Recorded T_m = ${input}s.<br>Finally, enter the Dead Time (tau_m) in seconds:`);
            currentState = 'ASK_TAUM';
        } 
        else if (currentState === 'ASK_TAUM') {
            processData.taum = input;
            addBotMessage("Parameters mapped. Analyzing process geometry against O'Dwyer bounds...");
            currentState = 'WAITING_FOR_SELECTION';
            await analyzeProcess();
        }
        else if (currentState === 'RESET') {
            processData.km = input;
            addBotMessage(`Recorded K_m = ${input}.<br>Next, enter the Time Constant (T_m) in seconds:`);
            currentState = 'ASK_TM';
        }
    }

    async function analyzeProcess() {
        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ km: processData.km, tm: processData.tm, taum: processData.taum })
            });
            const data = await response.json();
            
            if(data.status === "error") {
                addBotMessage(`Calculation Error: ${data.message}. Enter K_m to restart.`);
                currentState = 'RESET';
                return;
            }

            let msg = `<b>Analysis Complete.</b><br>Calculated L/Tau Ratio: <b>${data.ratio}</b><br><br>`;
            
            if (data.suitable_rules.length === 0) {
                msg += "This L/Tau ratio falls completely outside the bounds of the FOLPD dataset. Enter a new K_m to restart.";
                addBotMessage(msg);
                currentState = 'RESET';
                return;
            }

            msg += "Based on this specific ratio, here are the applicable tuning rules. Review the advantages and disadvantages before making a selection:";
            addBotMessage(msg);

            let gridHtml = '<div class="rules-grid">';
            data.suitable_rules.forEach(rule => {
                gridHtml += `
                    <div class="rule-card">
                        <div class="rule-title">⚙️ ${rule.name}</div>
                        <div class="adv-text"><b>ADVANTAGE:</b> ${rule.advantages}</div>
                        <div class="dis-text"><b>DISADVANTAGE:</b> ${rule.disadvantages}</div>
                        <button class="select-btn" onclick="executeMath('${rule.id}', '${rule.name}')">Apply Rule to My Parameters</button>
                    </div>
                `;
            });
            gridHtml += '</div>';
            chatLog.innerHTML += `<div class="bot-msg" style="background:transparent; padding:0; box-shadow:none;">${gridHtml}</div>`;
            scrollToBottom();

        } catch (error) {
            addBotMessage("Server connection lost. Please restart the backend.");
        }
    }

    async function executeMath(ruleId, ruleName) {
        addBotMessage(`Selection acknowledged: <b>${ruleName}</b>. Retrieving symbolic equations and evaluating insights for your specific process...`);
        
        try {
            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ km: processData.km, tm: processData.tm, taum: processData.taum, rule_id: ruleId })
            });
            const data = await response.json();
            
            if(data.status === "success") {
                let output = `
                    <div class="math-box">
                        [Equations Executed]<br>
                        K_c = ${data.kc_eq}<br>
                        T_i = ${data.ti_eq}<br>
                        T_d = ${data.td_eq}<br><br>
                        [Final PI/PID Parameters]<br>
                        Proportional Gain (K_c) = ${data.kc}<br>
                        Integral Time (T_i)     = ${data.ti} sec<br>
                        Derivative Time (T_d)   = ${data.td} sec
                    </div>
                    <div class="insight-box">
                        ${data.insight}
                    </div><br>
                    Session complete. If you wish to analyze a new process, simply type the new K_m.
                `;
                addBotMessage(output);
            } else {
                addBotMessage(`Math Error: ${data.message}`);
            }
            currentState = 'RESET';
        } catch (error) {
            addBotMessage("Failed to execute math engine.");
            currentState = 'RESET';
        }
    }
</script>

</body>
</html>
