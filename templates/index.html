<!DOCTYPE html>
<html>
<head>
    <title>Process AI Pro</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; display: flex; justify-content: center; }
        #chat-container { width: 100%; max-width: 600px; height: 92vh; background: white; margin-top: 20px; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        #messages { flex: 1; overflow-y: auto; padding: 25px; }
        .bubble { margin-bottom: 18px; padding: 15px 20px; border-radius: 18px; line-height: 1.5; max-width: 85%; font-size: 15px; }
        .bot { background: #f1f3f4; align-self: flex-start; border: 1px solid #e0e0e0; color: #333; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        #input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 25px; border: 1px solid #ddd; border-radius: 35px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 30px; border-radius: 35px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages">
            <div class="bubble bot">Hello! I'm your Process AI. Tell me your <b>Km</b>, <b>Tm</b>, and <b>Tau</b> (or Tow) values to get started.</div>
        </div>
        <div id="input-area">
            <input type="text" id="userIn" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('userIn');
            const text = input.value; if(!text) return;
            addMsg(text, 'user'); input.value = '';
            const res = await fetch('/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });
            const data = await res.json();
            const botDiv = addMsg(data.response, 'bot');
            if(data.chart) {
                const chartDiv = document.createElement('div');
                chartDiv.id = 'p-' + Date.now();
                botDiv.appendChild(chartDiv);
                Plotly.newPlot(chartDiv.id, JSON.parse(data.chart).data, JSON.parse(data.chart).layout);
            }
        }
        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `bubble ${s}`; d.innerHTML = t;
            const m = document.getElementById('messages');
            m.appendChild(d); m.scrollTop = m.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
