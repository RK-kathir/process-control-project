<!DOCTYPE html>
<html>
<head>
    <title>Process Expert Pro</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; }
        #container { width: 100%; max-width: 800px; height: 95vh; background: white; margin: 10px; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 20px; padding: 15px; border-radius: 10px; line-height: 1.6; }
        .bot { background: #f8f9fa; border: 1px solid #dee2e6; width: 90%; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        #chart-area { width: 100%; height: 250px; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        #input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; }
        table { margin-top: 10px; border-top: 1px solid #eee; }
        th, td { text-align: left; padding: 5px; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>
    <div id="container">
        <div id="chat" id="messages">
            <div class="msg bot"><b>Welcome to Process Expert Pro</b><br>Give me your Km, Tm, and Tau. <i>New: Paste raw data like [0, 1.2, 2.5, 3.8] to identify model!</i></div>
        </div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value; if(!text) return;
            addMsg(text, 'user'); input.value = '';
            
            const res = await fetch('/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });
            const data = await res.json();
            
            let botMsg = addMsg(data.response, 'bot');
            
            if(data.chart) {
                const chartDiv = document.createElement('div');
                chartDiv.id = 'chart-' + Date.now();
                chartDiv.style.height = '300px';
                botMsg.appendChild(chartDiv);
                const plotData = JSON.parse(data.chart);
                Plotly.newPlot(chartDiv.id, plotData.data, plotData.layout);
            }
        }
        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`; d.innerHTML = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
