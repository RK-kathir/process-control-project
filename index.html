<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Control Tuning Bot</title>
    
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 90vh; /* Keeps it fitted to the screen */
        }
        .header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .user-msg {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
            padding: 12px 18px;
            border-radius: 15px 15px 0 15px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .bot-msg {
            align-self: flex-start;
            background-color: #f1f3f5;
            color: #333;
            padding: 12px 18px;
            border-radius: 15px 15px 15px 0;
            max-width: 80%;
            white-space: pre-wrap; /* Ensures the Python line breaks format correctly */
            word-wrap: break-word;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ddd;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        button {
            padding: 12px 24px;
            margin-left: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #chart-container {
            width: 100%;
            margin-top: 15px;
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">TUNING BOT</div>
    
    <div id="chat-box">
        <div class="bot-msg"><b>Bot:</b> Welcome to Tuning Bot. Enter your process parameters (Km, Tm, Tau) and let me know your industrial scenario to get started.</div>
    </div>

    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Type your message here..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // 1. Allows pressing "Enter" on the keyboard to trigger the Send button
    function handleEnter(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // 2. Creates the visual chat bubbles on the screen
    function addMessageToChat(sender, text) {
        const chatBox = document.getElementById('chat-box'); 
        if (!chatBox) return;
        
        const messageDiv = document.createElement('div');
        messageDiv.className = sender === 'User' ? 'user-msg' : 'bot-msg'; 
        
        // Clean up the text so we don't accidentally print "Bot: Bot:" 
        let cleanText = text;
        if (sender === 'Bot') {
            cleanText = cleanText.replace(/^Bot:\s*/, '');
        }
        
        messageDiv.innerHTML = `<b>${sender}:</b> ${cleanText}`;
        chatBox.appendChild(messageDiv);
        
        // Auto-scroll to the bottom of the chat
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    // 3. Uses Plotly to draw the step response graph
    function drawChart(chartData) {
        let chartDiv = document.getElementById('chart-container');
        
        // If the chart container doesn't exist yet, build it
        if (!chartDiv) {
            chartDiv = document.createElement('div');
            chartDiv.id = 'chart-container';
            document.getElementById('chat-box').appendChild(chartDiv);
        }
        
        // Tell Plotly to draw the graph
        Plotly.newPlot(chartDiv.id, chartData.data, chartData.layout);
        
        // Scroll down so the user can see the new graph
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    // 4. The Main Engine: Sends data to Render and waits for the reply
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        if (!input) return;

        const message = input.value.trim();
        if (!message) return;

        // Display the user's message and clear the text box
        addMessageToChat('User', message);
        input.value = '';

        // Create a temporary "Thinking..." bubble
        const chatBox = document.getElementById('chat-box');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'bot-msg';
        typingDiv.id = 'typing-indicator';
        typingDiv.innerHTML = `<i>Thinking...</i>`;
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // POST request to your Render Python server
            const response = await fetch('https://process-control-project.onrender.com/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            
            // Remove the "Thinking..." indicator
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove(); 

            // Display the text reply from Python
            if (data.reply) {
                addMessageToChat('Bot', data.reply);
            }
            
            // If Python attached graph data, draw it
            if (data.chart) {
                drawChart(JSON.parse(data.chart));
            }

        } catch (error) {
            // If the server fails or is asleep, remove the thinking indicator and show an error
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove(); 
            
            console.error("Fetch Error:", error);
            addMessageToChat('Bot', '<span style="color:red;">Network error. The Render server might be waking up or offline. Please wait 60 seconds and try again.</span>');
        }
    }
</script>

</body>
</html>
