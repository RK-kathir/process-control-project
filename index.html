<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNING BOT</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg-main: #121212; --bg-side: #0a0a0a; --bg-input: #1e1e1e; --text-main: #f0f0f0; --text-muted: #888888; --accent: #0ea5e9; --msg-user: #2d2d2d; --border: #2a2a2a; }
        body.light-mode { --bg-main: #f9fafb; --bg-side: #ffffff; --bg-input: #ffffff; --text-main: #111827; --text-muted: #6b7280; --accent: #0284c7; --msg-user: #e5e7eb; --border: #e5e7eb; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s;}
        
        #sidebar { width: 260px; background: var(--bg-side); display: flex; flex-direction: column; border-right: 1px solid var(--border); z-index: 10; }
        .side-head { padding: 25px 20px; font-weight: 800; font-size: 1.1em; letter-spacing: 1.5px; }
        .action-btn { margin: 0 15px 15px 15px; padding: 12px; background: transparent; border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; cursor: pointer; transition: 0.2s;}
        .action-btn:hover { background: var(--border); }
        .theme-toggle { margin: 15px; padding: 12px; text-align: center; cursor: pointer; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; font-size: 0.9em; transition: 0.2s;}
        
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-box { flex: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; padding-bottom: 180px; scroll-behavior: smooth; }
        
        .msg { padding: 0; max-width: 85%; line-height: 1.6; animation: fadeIn 0.3s ease-out;}
        .user-msg { background: var(--msg-user); color: var(--text-main); align-self: flex-end; padding: 12px 20px; border-radius: 20px; border-bottom-right-radius: 4px; }
        .bot-msg { color: var(--text-main); align-self: flex-start; width: 100%; display: flex; flex-direction: column; gap: 6px;}
        .bot-icon { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #0ea5e9, #8b5cf6); flex-shrink: 0;}
        .bot-header { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.9em; color: var(--text-main);}
        
        .options-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .option-btn { padding: 10px 18px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85em; transition: 0.2s; }
        .option-btn:hover { background: var(--accent); color: white; }

        .suggestions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
        .chip { padding: 8px 16px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85em; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .chip:hover { border-color: var(--accent); color: var(--accent); }

        .input-wrapper { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, var(--bg-main) 30%); padding: 40px 15% 30px 15%; display: flex; flex-direction: column;}
        .input-container { display: flex; background: var(--bg-input); border: 1px solid var(--border); border-radius: 25px; padding: 6px 6px 6px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1em; outline: none; }
        button.send { padding: 12px 24px; background: var(--text-main); color: var(--bg-main); border: none; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s;}

        .dynamic-loader { height: 20px; width: 40%; border-radius: 4px; background: linear-gradient(90deg, var(--bg-input) 25%, var(--border) 50%, var(--bg-input) 75%); background-size: 200% 100%; animation: pulse-loading 1.5s infinite linear; }
        @keyframes pulse-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark-mode">

<div id="sidebar">
    <div class="side-head">TUNING BOT</div>
    <button class="action-btn" onclick="startNewChat()">+ New Session</button>
    <div style="flex:1"></div>
    <div class="theme-toggle" onclick="toggleTheme()">☀️ / 🌙 Theme</div>
</div>

<div id="main">
    <div id="chat-box"></div>
    <div class="input-wrapper">
        <div class="suggestions">
            <div class="chip" onclick="sendChip('What tuning rules do you have?')">What tuning rules do you have?</div>
            <div class="chip" onclick="sendChip('Km=2, Tm=10, Tau=2')">Start Example</div>
        </div>
        <div class="input-container">
            <input type="text" id="chat-input" placeholder="Message TUNING BOT..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send" onclick="sendMessage()">↑</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://process-control-project.onrender.com/api/chat';

    window.onload = () => {
        if(localStorage.getItem('tb_theme') === 'light') document.body.className = 'light-mode';
        startNewChat();
    };

    function toggleTheme() {
        document.body.className = document.body.className === 'light-mode' ? 'dark-mode' : 'light-mode';
        localStorage.setItem('tb_theme', document.body.className === 'light-mode' ? 'light' : 'dark');
    }

    function startNewChat() {
        document.getElementById('chat-box').innerHTML = "";
        fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: "reset"}) }).then(res => res.json()).then(data => renderBotReply(data.reply, data.options));
    }

    function sendChip(text) { document.getElementById('chat-input').value = text; sendMessage(); }
    function sendOption(label) { document.getElementById('chat-input').value = label; sendMessage(); }

    function drawChart(cData) {
        const cId = 'chart-' + Date.now();
        document.getElementById('chat-box').innerHTML += `<div id="${cId}" style="width:100%; height:350px; margin-top:15px; border-radius:12px; border:1px solid var(--border); overflow:hidden;"></div>`;
        
        try {
            let parsed = typeof cData === 'string' ? JSON.parse(cData) : cData;
            const isL = document.body.className === 'light-mode';
            parsed.layout.font = { color: isL ? '#333' : '#e0e0e0' };
            parsed.layout.xaxis.gridcolor = isL ? '#e5e7eb' : '#333';
            parsed.layout.yaxis.gridcolor = isL ? '#e5e7eb' : '#333';
            Plotly.newPlot(cId, parsed.data, parsed.layout);
        } catch (e) {
            console.error("Plotly error: ", e);
        }
        scrollToBottom();
    }

    function renderBotReply(text, opts = [], chart = null) {
        let btnHtml = opts.length > 0 ? `<div class="options-container">` + opts.map(o => `<button class="option-btn" onclick="sendOption('${o.val}')">${o.label}</button>`).join('') + `</div>` : "";
        
        document.getElementById('chat-box').innerHTML += `
            <div class="msg bot-msg">
                <div class="bot-header"><div class="bot-icon"></div> TUNING BOT</div>
                <div style="padding-left: 34px;">${text}${btnHtml}</div>
            </div>`;
        
        if (chart) drawChart(chart);
        scrollToBottom();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return; 
        input.value = '';
        
        document.getElementById('chat-box').innerHTML += `<div class="msg user-msg">${text}</div>`;
        
        const tempId = "typ-" + Date.now();
        document.getElementById('chat-box').innerHTML += `
            <div class="msg bot-msg" id="${tempId}">
                <div class="bot-header"><div class="bot-icon"></div> TUNING BOT</div>
                <div style="padding-left: 34px; margin-top:8px;"><div class="dynamic-loader"></div></div>
            </div>`;
        scrollToBottom();

        try {
            const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: text}) });
            const data = await res.json();
            document.getElementById(tempId).remove();
            renderBotReply(data.reply, data.options, data.chart);
        } catch(e) {
            document.getElementById(tempId).remove();
            renderBotReply("Connection failed. Check server status.", [], null);
        }
    }

    function scrollToBottom() { const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight; }
</script>
</body>
</html>
