<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNING BOT</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        /* CSS Variables for Dynamic Theming */
        :root { 
            --bg-main: #121212; 
            --bg-side: #0a0a0a; 
            --bg-input: #1e1e1e;
            --text-main: #f0f0f0; 
            --text-muted: #888888;
            --accent: #0ea5e9; 
            --accent-hover: #0284c7;
            --msg-user: #0ea5e9; 
            --msg-bot: #1e1e1e;
            --border: #2a2a2a;
        }

        /* Light Mode Overrides */
        body.light-mode {
            --bg-main: #ffffff; 
            --bg-side: #f4f4f5; 
            --bg-input: #ffffff;
            --text-main: #111827; 
            --text-muted: #6b7280;
            --accent: #0284c7; 
            --msg-user: #0284c7; 
            --msg-bot: #f9fafb;
            --border: #e5e7eb;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        /* Sidebar Styling */
        #sidebar { width: 260px; background: var(--bg-side); display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: background 0.3s; }
        .side-head { padding: 25px 20px; font-weight: 700; font-size: 1.2em; color: var(--text-main); letter-spacing: 1px; }
        .action-btn { margin: 0 15px 15px 15px; padding: 12px; background: transparent; border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btn:hover { background: var(--border); }
        
        #history-list { flex: 1; overflow-y: auto; padding: 0 15px; }
        .history-item { padding: 12px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); transition: 0.2s; }
        .history-item:hover { background: var(--border); color: var(--text-main); }

        /* Theme Toggle */
        .theme-toggle { margin: 15px; padding: 12px; text-align: center; cursor: pointer; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-weight: bold; }
        
        /* Main Chat Area */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-box { flex: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 150px; scroll-behavior: smooth; }
        
        /* Chat Bubbles */
        .msg { padding: 15px 20px; border-radius: 12px; max-width: 85%; line-height: 1.6; animation: fadeIn 0.3s ease-out; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-msg { background: var(--msg-user); color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: var(--msg-bot); color: var(--text-main); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 2px; width: 100%; }
        .bot-label { font-weight: bold; color: var(--accent); margin-bottom: 5px; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Floating Input Area & Chips */
        .input-wrapper { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, var(--bg-main) 30%); padding: 20px 15% 30px 15%; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        
        .suggestions { display: flex; gap: 10px; pointer-events: auto; flex-wrap: wrap; justify-content: center; }
        .chip { padding: 8px 15px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85em; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .chip:hover { border-color: var(--accent); color: var(--accent); }

        .input-container { display: flex; background: var(--bg-input); border: 1px solid var(--border); border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 5px 5px 5px 20px; pointer-events: auto; }
        input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1em; outline: none; }
        button.send { padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.send:hover { background: var(--accent-hover); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark-mode">

<div id="sidebar">
    <div class="side-head">⚡ TUNING BOT</div>
    <button class="action-btn" onclick="startNewChat()">+ New Session</button>
    <div id="history-list"></div>
    <div class="theme-toggle" onclick="toggleTheme()">☀️ Light / 🌙 Dark Mode</div>
</div>

<div id="main">
    <div id="chat-box"></div>
    
    <div class="input-wrapper">
        <div class="suggestions">
            <div class="chip" onclick="sendChip('What tuning rules do you have?')">What rules do you have?</div>
            <div class="chip" onclick="sendChip('Km=2, Tm=10, Tau=2 for IAE')">Tune for IAE</div>
            <div class="chip" onclick="sendChip('Km=1.5, Tm=8, Tau=3. I want a fast response')">Fast Response</div>
        </div>
        <div class="input-container">
            <input type="text" id="chat-input" placeholder="Message TUNING BOT..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    let sessions = JSON.parse(localStorage.getItem("tb_sessions")) || [];
    let currentId = null;

    window.onload = () => {
        // Load Theme
        if(localStorage.getItem('tb_theme') === 'light') {
            document.body.className = 'light-mode';
        }
        renderSidebar();
        if (sessions.length > 0) { loadSession(sessions[0].id); } 
        else { startNewChat(); }
    };

    function toggleTheme() {
        const body = document.body;
        if(body.className === 'light-mode') {
            body.className = 'dark-mode';
            localStorage.setItem('tb_theme', 'dark');
        } else {
            body.className = 'light-mode';
            localStorage.setItem('tb_theme', 'light');
        }
        // Theme toggle does not redraw past graphs dynamically to save memory, 
        // but new graphs will adopt the current theme automatically.
    }

    function startNewChat() {
        currentId = Date.now();
        const initialMsg = `<div class="msg bot-msg"><div class="bot-label">Tuning Bot</div>Hello! I am your Process Tuning Bot. I specialize in Ziegler-Nichols, Hazebroek, and Rovira optimization. Enter your parameters to begin.</div>`;
        sessions.unshift({ id: currentId, title: "New Tuning Session", html: initialMsg });
        
        saveData();
        renderSidebar();
        loadSession(currentId); // This clears the chat box naturally
        fetch('https://process-control-project.onrender.com/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: "reset"}) }).catch(e=>console.log(e));
    }

    function loadSession(id) {
        currentId = id;
        const session = sessions.find(s => s.id === id);
        if(session) {
            document.getElementById('chat-box').innerHTML = session.html;
            scrollToBottom();
        }
    }

    function renderSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        sessions.forEach(s => {
            let div = document.createElement('div');
            div.className = "history-item";
            div.innerText = s.title;
            div.onclick = () => loadSession(s.id);
            list.appendChild(div);
        });
    }

    function saveData() {
        const session = sessions.find(s => s.id === currentId);
        if (session) {
            session.html = document.getElementById('chat-box').innerHTML;
            localStorage.setItem("tb_sessions", JSON.stringify(sessions));
        }
    }

    function updateTitle(userText) {
        const session = sessions.find(s => s.id === currentId);
        if (session && session.title === "New Tuning Session") {
            session.title = userText.substring(0, 20) + "...";
            renderSidebar();
        }
    }

    function sendChip(text) {
        document.getElementById('chat-input').value = text;
        sendMessage();
    }

    function drawChart(chartData) {
        const chatBox = document.getElementById('chat-box');
        const chartId = 'chart-' + Date.now(); 
        
        const chartDiv = document.createElement('div');
        chartDiv.id = chartId;
        chartDiv.style.width = "100%";
        chartDiv.style.height = "350px";
        chartDiv.style.marginTop = "15px";
        chartDiv.style.borderRadius = "8px";
        chartDiv.style.border = "1px solid var(--border)";
        chatBox.appendChild(chartDiv);
        
        try {
            let parsedData = typeof chartData === 'string' ? JSON.parse(chartData) : chartData;
            
            // Apply current theme to graph dynamically
            const isLight = document.body.className === 'light-mode';
            const fontColor = isLight ? '#333' : '#e0e0e0';
            const gridColor = isLight ? '#e5e7eb' : '#333';
            
            parsedData.layout.font = { color: fontColor };
            parsedData.layout.xaxis.gridcolor = gridColor;
            parsedData.layout.yaxis.gridcolor = gridColor;

            Plotly.newPlot(chartId, parsedData.data, parsedData.layout);
        } catch (error) {
            console.error("Plotly error:", error);
            chatBox.innerHTML += `<div style="color:red; margin-top:10px;">Graph Error: ${error.message}</div>`;
        }
        scrollToBottom();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        updateTitle(text);
        input.value = '';

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
        
        const tempId = "typ-" + Date.now();
        chatBox.innerHTML += `<div class="msg bot-msg" id="${tempId}"><div class="bot-label">Tuning Bot</div><i>Analyzing...</i></div>`;
        scrollToBottom();

        try {
            const res = await fetch('https://process-control-project.onrender.com/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            
            document.getElementById(tempId).remove();
            
            if(data.reply) {
                chatBox.innerHTML += `<div class="msg bot-msg"><div class="bot-label">Tuning Bot</div>${data.reply.replace(/\n/g, "<br>")}</div>`;
            }
            if(data.chart) { drawChart(data.chart); }
            
        } catch(e) {
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div class="msg bot-msg" style="color:#ef4444;">API Error: Could not connect.</div>`;
        }
        
        scrollToBottom();
        saveData();
    }

    function scrollToBottom() {
        const b = document.getElementById('chat-box');
        b.scrollTop = b.scrollHeight;
    }
</script>

</body>
</html>
