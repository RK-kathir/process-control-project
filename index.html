<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Dwyer Expert SLM</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --side: #121212; --msg-user: #007bff; --msg-bot: #2c2c2c; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        #sidebar { width: 260px; background: var(--side); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .side-head { padding: 20px; font-weight: bold; font-size: 1.1em; color: white; border-bottom: 1px solid #333; }
        .new-btn { margin: 15px; padding: 12px; background: transparent; border: 1px solid #555; color: white; border-radius: 5px; cursor: pointer; }
        .new-btn:hover { background: #333; }
        #history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 10px; margin-bottom: 5px; background: #222; border-radius: 5px; cursor: pointer; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #333; }

        #main { flex: 1; display: flex; flex-direction: column; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user-msg { background: var(--msg-user); color: white; align-self: flex-end; }
        .bot-msg { background: var(--msg-bot); color: var(--text); align-self: flex-start; border: 1px solid #444; }
        
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid #333; display: flex; }
        input { flex: 1; padding: 15px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 20px; outline: none; }
        button.send { padding: 0 25px; margin-left: 10px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="side-head">🏭 Industrial SLM</div>
    <button class="new-btn" onclick="startNewChat()">+ New Process Tuning</button>
    <div id="history-list"></div>
</div>

<div id="main">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Enter Km, Tm, Tau or ask about O'Dwyer rules..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let sessions = JSON.parse(localStorage.getItem("slm_sessions")) || [];
    let currentId = null;

    window.onload = () => {
        renderSidebar();
        if (sessions.length > 0) {
            loadSession(sessions[0].id);
        } else {
            startNewChat();
        }
    };

    function startNewChat() {
        currentId = Date.now();
        sessions.unshift({ id: currentId, title: "New Tuning Session", html: `<div class="msg bot-msg"><b>System:</b> Connected to O'Dwyer Expert SLM. Ready for parameters.</div>` });
        saveData();
        renderSidebar();
        loadSession(currentId);
        fetch('https://process-control-project.onrender.com/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: "reset"}) });
    }

    function loadSession(id) {
        currentId = id;
        const session = sessions.find(s => s.id === id);
        document.getElementById('chat-box').innerHTML = session.html;
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function renderSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        sessions.forEach(s => {
            let div = document.createElement('div');
            div.className = "history-item";
            div.innerText = s.title;
            div.onclick = () => loadSession(s.id);
            list.appendChild(div);
        });
    }

    function saveData() {
        const session = sessions.find(s => s.id === currentId);
        if (session) {
            session.html = document.getElementById('chat-box').innerHTML;
            localStorage.setItem("slm_sessions", JSON.stringify(sessions));
        }
    }

    // Auto-generate title based on user input
    function updateTitle(userText) {
        const session = sessions.find(s => s.id === currentId);
        if (session.title === "New Tuning Session") {
            // Grab the first few words as the title
            session.title = userText.substring(0, 20) + "...";
            renderSidebar();
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        updateTitle(text);
        input.value = '';

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg user-msg"><b>User:</b> ${text}</div>`;
        const tempId = "typ-" + Date.now();
        chatBox.innerHTML += `<div class="msg bot-msg" id="${tempId}"><i>Calculating...</i></div>`;
        scrollToBottom();

        try {
            const res = await fetch('https://process-control-project.onrender.com/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            
            document.getElementById(tempId).remove();
            if(data.reply) chatBox.innerHTML += `<div class="msg bot-msg"><b>Bot:</b><br>${data.reply.replace(/\n/g, "<br>")}</div>`;
            
            if(data.chart) {
                const cId = 'chart-' + Date.now();
                chatBox.innerHTML += `<div id="${cId}" style="width:100%;height:300px;background:white;border-radius:5px;margin-top:10px;"></div>`;
                Plotly.newPlot(cId, JSON.parse(data.chart).data, JSON.parse(data.chart).layout);
            }
        } catch(e) {
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div class="msg bot-msg" style="color:#ff4444;">Error connecting to Render API.</div>`;
        }
        
        scrollToBottom();
        saveData();
    }

    function scrollToBottom() {
        const b = document.getElementById('chat-box');
        b.scrollTop = b.scrollHeight;
    }
</script>

</body>
</html>
