<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process SLM</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --side: #121212; --msg-user: #007bff; --msg-bot: #2c2c2c; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        #sidebar { width: 260px; background: var(--side); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .side-head { padding: 20px; font-weight: bold; font-size: 1.1em; color: white; border-bottom: 1px solid #333; }
        .action-btn { margin: 10px 15px; padding: 12px; background: transparent; border: 1px solid #555; color: white; border-radius: 5px; cursor: pointer; text-align: center; }
        .action-btn:hover { background: #333; }
        .export-btn { border-color: #28a745; color: #28a745; }
        .export-btn:hover { background: #28a745; color: white; }
        
        #history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 10px; margin-bottom: 5px; background: #222; border-radius: 5px; cursor: pointer; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #333; }

        #main { flex: 1; display: flex; flex-direction: column; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 10px; max-width: 80%; line-height: 1.5; word-wrap: break-word; }
        .user-msg { background: var(--msg-user); color: white; align-self: flex-end; }
        .bot-msg { background: var(--msg-bot); color: var(--text); align-self: flex-start; border: 1px solid #444; width: 100%; max-width: 800px; }
        
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid #333; display: flex; }
        input { flex: 1; padding: 15px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 20px; outline: none; font-size: 1em; }
        button.send { padding: 0 25px; margin-left: 10px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 1em; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="side-head">⚙️ Process SLM</div>
    <button class="action-btn" onclick="startNewChat()">+ New Session</button>
    <button class="action-btn export-btn" onclick="exportToMatlab()">📥 Export for MATLAB</button>
    <div id="history-list"></div>
</div>

<div id="main">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Enter parameters (Km, Tm, Tau) or ask a question..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let sessions = JSON.parse(localStorage.getItem("slm_sessions")) || [];
    let currentId = null;

    window.onload = () => {
        renderSidebar();
        if (sessions.length > 0) {
            loadSession(sessions[0].id);
        } else {
            startNewChat();
        }
    };

    function startNewChat() {
        currentId = Date.now();
        sessions.unshift({ id: currentId, title: "New Tuning Session", html: `<div class="msg bot-msg"><b>System:</b> Connected to Tuning SLM. Awaiting process parameters.</div>` });
        saveData();
        renderSidebar();
        loadSession(currentId);
        fetch('https://process-control-project.onrender.com/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: "reset"}) }).catch(e => console.log(e));
    }

    function loadSession(id) {
        currentId = id;
        const session = sessions.find(s => s.id === id);
        if(session) {
            document.getElementById('chat-box').innerHTML = session.html;
            scrollToBottom();
        }
    }

    function renderSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        sessions.forEach(s => {
            let div = document.createElement('div');
            div.className = "history-item";
            div.innerText = s.title;
            div.onclick = () => loadSession(s.id);
            list.appendChild(div);
        });
    }

    function saveData() {
        const session = sessions.find(s => s.id === currentId);
        if (session) {
            session.html = document.getElementById('chat-box').innerHTML;
            localStorage.setItem("slm_sessions", JSON.stringify(sessions));
        }
    }

    function updateTitle(userText) {
        const session = sessions.find(s => s.id === currentId);
        if (session && session.title === "New Tuning Session") {
            session.title = userText.substring(0, 20) + "...";
            renderSidebar();
        }
    }

    function exportToMatlab() {
        const chatText = document.getElementById('chat-box').innerText;
        const kcMatch = chatText.match(/Kc:\s*([\d.]+)/g);
        const tiMatch = chatText.match(/Ti:\s*([\d.]+)/g);
        
        let content = "% MATLAB Auto-Tuning Parameters Export\n% Generated by Process SLM\n\n";
        
        if (kcMatch && tiMatch) {
            const finalKc = kcMatch[kcMatch.length - 1].split(':')[1].trim();
            const finalTi = tiMatch[tiMatch.length - 1].split(':')[1].trim();
            content += `Kc = ${finalKc};\nTi = ${finalTi};\n\n% Apply to your PID controller block\n`;
        } else {
            content += "% No Tuning Parameters found in current session.\n";
        }
        
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'matlab_tuning_params.m';
        a.click();
    }

    // THE GRAPH FIX
    function drawChart(chartData) {
        const chatBox = document.getElementById('chat-box');
        const chartId = 'chart-' + Date.now(); 
        
        const chartDiv = document.createElement('div');
        chartDiv.id = chartId;
        chartDiv.style.width = "100%";
        chartDiv.style.height = "350px";
        chartDiv.style.marginTop = "15px";
        chartDiv.style.background = "white"; 
        chartDiv.style.borderRadius = "8px";
        chatBox.appendChild(chartDiv);
        
        try {
            // Safely parse JSON to prevent the silent crash
            let parsedData = typeof chartData === 'string' ? JSON.parse(chartData) : chartData;
            Plotly.newPlot(chartId, parsedData.data, parsedData.layout);
        } catch (error) {
            console.error("Plotly render error:", error);
            chatBox.innerHTML += `<div style="color:red; margin-top:10px;">Graph Error: ${error.message}</div>`;
        }
        scrollToBottom();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        updateTitle(text);
        input.value = '';

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg user-msg"><b>User:</b> ${text}</div>`;
        
        const tempId = "typ-" + Date.now();
        chatBox.innerHTML += `<div class="msg bot-msg" id="${tempId}"><i>Calculating...</i></div>`;
        scrollToBottom();

        try {
            const res = await fetch('https://process-control-project.onrender.com/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            
            document.getElementById(tempId).remove();
            
            if(data.reply) {
                chatBox.innerHTML += `<div class="msg bot-msg"><b>Bot:</b><br>${data.reply.replace(/\n/g, "<br>")}</div>`;
            }
            
            if(data.chart) {
                drawChart(data.chart);
            }
            
        } catch(e) {
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div class="msg bot-msg" style="color:#ff4444;">API Error: Could not connect to Render.</div>`;
        }
        
        scrollToBottom();
        saveData();
    }

    function scrollToBottom() {
        const b = document.getElementById('chat-box');
        b.scrollTop = b.scrollHeight;
    }
</script>

</body>
</html>
