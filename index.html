<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNING BOT</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fb;
            --chat-bg: #ffffff;
            --text-color: #202124;
            --user-bubble: #007bff;
            --bot-bubble: #f1f3f4;
            --bot-text: #202124;
            --input-bg: rgba(255, 255, 255, 0.85);
            --border-glow: rgba(0, 123, 255, 0.3);
            --graph-border: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #131314;
            --chat-bg: #1e1e20;
            --text-color: #e8eaed;
            --user-bubble: #4a90e2;
            --bot-bubble: #2a2a2c;
            --bot-text: #e8eaed;
            --input-bg: rgba(30, 30, 32, 0.85);
            --border-glow: rgba(74, 144, 226, 0.4);
            --graph-border: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .theme-toggle {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-color);
        }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px;
        }

        .bubble {
            max-width: 80%; padding: 15px 20px; border-radius: 20px; line-height: 1.5; font-size: 1rem;
            animation: fadeIn 0.3s ease-in-out;
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background-color: var(--bot-bubble); color: var(--bot-text); border-bottom-left-radius: 4px; white-space: pre-wrap;}

        .graph-wrapper {
            margin-top: 15px; border: 1px solid var(--graph-border); border-radius: 12px;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white;
        }

        .input-area {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px;
            background: var(--input-bg); backdrop-filter: blur(12px); border: 1px solid var(--graph-border);
            border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 8px 32px var(--border-glow);
            transition: box-shadow 0.3s;
        }

        .input-area:focus-within { box-shadow: 0 8px 32px var(--user-bubble); }

        input { flex: 1; background: transparent; border: none; padding: 15px; font-size: 1rem; color: var(--text-color); outline: none; }
        button.send-btn { background-color: var(--user-bubble); color: white; border: none; border-radius: 50px; padding: 0 25px; font-weight: bold; cursor: pointer; }
        button.send-btn:active { transform: scale(0.95); }

        footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; color: var(--text-color); opacity: 0.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div>TUNING BOT</div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="chat-container" id="chat">
        <div class="bubble bot">Welcome to Tuning Bot. Enter your parameters (Km, Tm, Tau) and let me know if you need it fast, smooth, or require disturbance rejection.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask the tuning bot..." onkeypress="handleEnter(event)">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <footer>BUILT WITH ❤️ BY KATHIRVEL R</footer>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.getAttribute('data-theme') === 'dark' ? body.removeAttribute('data-theme') : body.setAttribute('data-theme', 'dark');
        }
async function sendMessage() {
    // 1. Ultra-safe way to find the text box
    const input = document.querySelector('input') || document.querySelector('textarea');
    
    if (!input) {
        console.error("Could not find the text box!");
        return;
    }

    const message = input.value.trim();
    if (!message) return;

    // 2. Show User Message
    addMessageToChat('User', message);
    input.value = '';

    // 3. Create the "Thinking..." bubble
    addMessageToChat('Bot', '<span id="typing-indicator" style="color: gray; font-style: italic;">Thinking...</span>');

    try {
        // 4. Send to Render
        const response = await fetch('https://process-control-project.onrender.com/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });

        const data = await response.json();
        
        // 5. Remove the "Thinking..." message securely
        const typingIndicator = document.getElementById('typing-indicator');
        if (typingIndicator && typingIndicator.parentElement) {
            typingIndicator.parentElement.remove(); 
        }

        // 6. Show the Bot Reply
        addMessageToChat('Bot', data.reply);
        
        // 7. Draw Chart if exists
        if (data.chart) {
            drawChart(JSON.parse(data.chart));
        }

    } catch (error) {
        const typingIndicator = document.getElementById('typing-indicator');
        if (typingIndicator && typingIndicator.parentElement) {
            typingIndicator.parentElement.remove();
        }
        addMessageToChat('Bot', 'Network error. Please try again.');
    }
}
        function addBubble(text, sender, chartData = null) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.innerText = text;

            if (chartData) {
                const chartDiv = document.createElement('div');
                chartDiv.id = 'plot_' + Date.now();
                chartDiv.className = 'graph-wrapper';
                div.appendChild(chartDiv);
                chat.appendChild(div);
                
                const plotData = JSON.parse(chartData);
                Plotly.newPlot(chartDiv.id, plotData.data, plotData.layout, {responsive: true});
            } else {
                chat.appendChild(div);
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
