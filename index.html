<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNING BOT — AI PID Optimizer</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root {
            --bg:        #080c12;
            --bg2:       #0c1018;
            --bg3:       #111827;
            --panel:     #0f1520;
            --border:    rgba(255,255,255,0.07);
            --border2:   rgba(0,212,255,0.2);
            --txt:       #e2e8f0;
            --txt2:      #64748b;
            --txt3:      #94a3b8;
            --cyan:      #00d4ff;
            --cyan2:     #0ea5e9;
            --purple:    #818cf8;
            --green:     #34d399;
            --red:       #f87171;
            --warn:      #fbbf24;
            --user-bg:   #1a2335;
            --glow:      0 0 30px rgba(0,212,255,0.12);
        }
        body.light {
            --bg:        #f0f4f8;
            --bg2:       #e8edf3;
            --bg3:       #dde3ec;
            --panel:     #ffffff;
            --border:    rgba(0,0,0,0.08);
            --border2:   rgba(14,165,233,0.3);
            --txt:       #1e293b;
            --txt2:      #94a3b8;
            --txt3:      #475569;
            --cyan:      #0284c7;
            --cyan2:     #0369a1;
            --user-bg:   #e0e8f0;
            --glow:      0 2px 20px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--txt);
            display: flex;
            transition: background .3s, color .3s;
        }

        #sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .logo {
            padding: 24px 20px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: monospace;
            font-size: 13px;
            font-weight: 700;
            color: #000;
            flex-shrink: 0;
        }
        .logo-text {
            font-family: monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--txt);
            text-transform: uppercase;
        }
        .logo-sub {
            font-size: 9px;
            color: var(--txt2);
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .side-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .side-btn {
            margin: 6px 12px;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--txt3);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .2s;
            text-align: left;
        }
        .side-btn:hover {
            border-color: var(--border2);
            color: var(--cyan);
            background: rgba(0,212,255,0.04);
        }
        .side-btn svg { opacity: 0.6; flex-shrink: 0; }
        .side-btn:hover svg { opacity: 1; }

        .status-box {
            margin: 8px 12px;
            padding: 10px 14px;
            background: rgba(52,211,153,0.06);
            border: 1px solid rgba(52,211,153,0.2);
            border-radius: 8px;
        }
        .status-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--green);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-label { font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 0.5px; }
        .status-detail { font-size: 10px; color: var(--txt2); margin-top: 2px; }

        .side-section-title {
            padding: 12px 20px 6px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--txt2);
            text-transform: uppercase;
        }
        .quick-chip {
            margin: 3px 12px;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--txt3);
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            text-align: left;
            width: calc(100% - 24px);
        }
        .quick-chip:hover {
            border-color: var(--border2);
            color: var(--txt);
            background: rgba(0,212,255,0.03);
        }

        .side-spacer { flex: 1; }

        .theme-btn {
            margin: 8px 12px 16px;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--txt3);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all .2s;
        }
        .theme-btn:hover { border-color: var(--border2); color: var(--txt); }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            background: var(--bg);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 32px max(32px, calc(50% - 380px));
            padding-bottom: 200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            position: relative;
            z-index: 1;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 20px;
            text-align: center;
            gap: 12px;
        }
        .welcome-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-family: monospace;
            font-size: 18px; font-weight: 700; color: #000;
            box-shadow: 0 0 40px rgba(0,212,255,0.2);
            margin-bottom: 8px;
        }
        .welcome h1 {
            font-family: monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--txt);
            letter-spacing: 1px;
        }
        .welcome p {
            font-size: 14px;
            color: var(--txt3);
            max-width: 380px;
            line-height: 1.6;
        }

        .msg { animation: slide-up .25s ease-out; }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            max-width: 75%;
            background: var(--user-bg);
            border: 1px solid var(--border);
            border-radius: 16px 16px 4px 16px;
            padding: 12px 18px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--txt);
        }

        .bot-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            max-width: 100%;
        }
        .bot-avatar {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border-radius: 8px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: monospace;
            font-size: 10px; font-weight: 700; color: #000;
            margin-top: 2px;
        }
        .bot-content { flex: 1; min-width: 0; }
        .bot-name {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--cyan);
            text-transform: uppercase;
            margin-bottom: 6px;
            font-family: monospace;
        }
        .bot-text {
            font-size: 14px;
            line-height: 1.75;
            color: var(--txt);
        }
        .bot-text code {
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.2);
            padding: 1px 6px;
            border-radius: 4px;
            color: var(--cyan);
        }
        .bot-text strong { color: var(--txt); font-weight: 600; }

        .options-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 14px;
        }
        .opt-btn {
            padding: 12px 16px;
            background: rgba(0,212,255,0.03);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 10px;
            color: var(--txt3);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all .2s;
            line-height: 1.4;
        }
        .opt-btn:hover {
            border-color: var(--cyan);
            color: var(--txt);
            background: rgba(0,212,255,0.07);
            transform: translateX(3px);
        }
        .opt-btn .opt-hint {
            display: block;
            font-size: 11px;
            color: var(--txt2);
            margin-top: 3px;
            font-weight: 400;
        }

        .loader-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 4px;
        }
        .skel {
            height: 14px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
            background-size: 300% 100%;
            animation: skel-anim 1.6s infinite ease-in-out;
        }
        .skel:nth-child(1) { width: 75%; }
        .skel:nth-child(2) { width: 55%; animation-delay: .1s; }
        .skel:nth-child(3) { width: 65%; animation-delay: .2s; }
        @keyframes skel-anim {
            0%   { background-position: 300% 0; }
            100% { background-position: -300% 0; }
        }

        .chart-wrap {
            margin-top: 16px;
            border: 1px solid var(--border2);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,212,255,0.02);
            box-shadow: var(--glow);
        }

        .input-zone {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            background: linear-gradient(transparent, var(--bg) 28%);
            padding: 32px max(32px, calc(50% - 380px)) 24px;
        }
        .input-wrap {
            display: flex;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3), var(--glow);
            transition: border-color .2s;
        }
        .input-wrap:focus-within {
            border-color: rgba(0,212,255,0.3);
        }
        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--txt);
            font-size: 14px;
            outline: none;
            padding: 6px 0;
            min-width: 0;
        }
        #chat-input::placeholder { color: var(--txt2); }
        .send-btn {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--cyan), var(--cyan2));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 16px rgba(0,212,255,0.4); }
        .send-btn svg { color: #000; }

        .chips-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .chip {
            padding: 6px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--txt2);
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }
        .chip:hover {
            border-color: rgba(0,212,255,0.3);
            color: var(--cyan);
            background: rgba(0,212,255,0.05);
        }

        @media (max-width: 680px) {
            #sidebar { display: none; }
            #chat-box { padding: 20px 16px 200px; }
            .input-zone { padding: 20px 16px 16px; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">
        <div class="logo-icon">PID</div>
        <div>
            <div class="logo-text">Tuning Bot</div>
            <div class="logo-sub">AI Optimizer</div>
        </div>
    </div>
    <div class="side-divider"></div>

    <button class="side-btn" onclick="startNewChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Session
    </button>

    <div class="status-box">
        <div><span class="status-dot"></span><span class="status-label">ENGINE ONLINE</span></div>
        <div class="status-detail" id="rules-count">Loading rules...</div>
    </div>

    <div class="side-divider" style="margin-top:8px"></div>
    <div class="side-section-title">Quick Start</div>
    <button class="quick-chip" onclick="sendChip('Km=2, Tm=10, Tau=2')"> Try example: Km=2 Tm=10 Tau=2</button>
    <button class="quick-chip" onclick="sendChip('What tuning rules do you have?')">📋 List all tuning rules</button>
    <button class="quick-chip" onclick="sendChip('What is PID control?')">🎓 Explain PID control</button>
    <button class="quick-chip" onclick="sendChip('Explain FOPDT parameters')"> Explain parameters</button>
    <button class="quick-chip" onclick="sendChip('What is IAE and ISE?')">📐 Performance metrics</button>

    <div class="side-spacer"></div>
    <button class="theme-btn" onclick="toggleTheme()">☀️ / 🌙 &nbsp; Toggle Theme</button>
</div>

<div id="main">
    <div id="chat-box">
        <div class="welcome" id="welcome-screen">
            <div class="welcome-icon">PID</div>
            <h1>TUNING BOT</h1>
            <p>AI-Pwered chatbot.</p>
        </div>
    </div>

    <div class="input-zone">
        <div class="chips-row">
            <div class="chip" onclick="sendChip('What tuning rules do you have?')">What rules do you have?</div>
            <div class="chip" onclick="sendChip('Km=2, Tm=10, Tau=2')">▶ Try an example</div>
            <div class="chip" onclick="sendChip('Explain FOPDT parameters')">What is FOPDT(first order + dead time)?</div>
            <div class="chip" onclick="sendChip('help')">Help me get started</div>
        </div>
        <div class="input-wrap">
            <input
                type="text"
                id="chat-input"
                placeholder="Enter Km, Tm, Tau or ask a question..."
                autocomplete="off"
                onkeydown="if(event.key==='Enter') sendMessage()"
            />
            <button class="send-btn" onclick="sendMessage()" title="Send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
   const API_URL = 'https://process-control-project.onrender.com/api/chat';

    window.onload = () => {
        if (localStorage.getItem('tb_theme') === 'light') document.body.classList.add('light');
        startNewChat();
    };

    function toggleTheme() {
        document.body.classList.toggle('light');
        localStorage.setItem('tb_theme', document.body.classList.contains('light') ? 'light' : 'dark');
        document.querySelectorAll('.plotly-chart').forEach(el => {
            const isLight = document.body.classList.contains('light');
            Plotly.relayout(el, {
                'font.color': isLight ? '#334155' : '#a0aec0',
                'xaxis.gridcolor': isLight ? '#e2e8f0' : '#1e2a3a',
                'yaxis.gridcolor': isLight ? '#e2e8f0' : '#1e2a3a',
            });
        });
    }

    function startNewChat() {
        document.getElementById('chat-box').innerHTML = `
            <div class="welcome" id="welcome-screen">
                <div class="welcome-icon">PID</div>
                <h1>TUNING BOT</h1>
                <p>AI-powered chatbot. Provide your process parameters and I'll handle the rest.</p>
            </div>`;
        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'reset' })
        })
        .then(r => r.json())
        .then(d => {
            const countEl = document.getElementById('rules-count');
            if (countEl) countEl.textContent = 'Random Forest — fopdt O\'Dwyer rules';
        })
        .catch(() => {});
    }

    function sendChip(text) {
        document.getElementById('chat-input').value = text;
        sendMessage();
    }

    function sendOption(val) {
        document.getElementById('chat-input').value = val;
        sendMessage();
    }

    // THE FIX: Simplified and robust rendering
    function renderBotMsg(text, opts = [], chart = null) {
        const ws = document.getElementById('welcome-screen');
        if (ws) ws.remove();

        const optsHtml = opts.length > 0
            ? `<div class="options-wrap">${opts.map(o => {
                const lines = o.label.split('\n');
                const mainLabel = lines[0];
                return `<button class="opt-btn" onclick="sendOption('${o.val}')">${mainLabel}</button>`;
              }).join('')}</div>`
            : '';

        // Safely parse the markdown
        let formattedText = text.replace(/\n/g, "<br>");
        
        // 1. Create the container for the text message
        const textRow = document.createElement('div');
        textRow.className = 'msg bot-row';
        textRow.innerHTML = `
            <div class="bot-avatar">TB</div>
            <div class="bot-content">
                <div class="bot-name">Tuning Bot</div>
                <div class="bot-text">${formattedText}${optsHtml}</div>
            </div>`;
        document.getElementById('chat-box').appendChild(textRow);

        // 2. If a chart exists, create a SEPARATE, dedicated container for it right below the text
        if (chart) {
            const chartId = 'chart-' + Date.now();
            const chartRow = document.createElement('div');
            chartRow.className = 'msg bot-row'; // Align it nicely with the avatar
            chartRow.innerHTML = `
                <div class="bot-avatar" style="visibility:hidden;"></div>
                <div class="bot-content chart-wrap" style="margin-top:0;">
                    <div id="${chartId}" class="plotly-chart" style="width:100%; height:340px;"></div>
                </div>`;
            document.getElementById('chat-box').appendChild(chartRow);

            // Give the browser a tiny microsecond to actually draw the empty div before Plotly targets it
            setTimeout(() => {
                try {
                    let parsed = typeof chart === 'string' ? JSON.parse(chart) : chart;
                    const isLight = document.body.classList.contains('light');
                    parsed.layout.font = { color: isLight ? '#334155' : '#a0aec0', family: '-apple-system, sans-serif', size: 12 };
                    parsed.layout.xaxis.gridcolor = isLight ? '#e2e8f0' : '#1e2a3a';
                    parsed.layout.yaxis.gridcolor = isLight ? '#e2e8f0' : '#1e2a3a';
                    parsed.layout.xaxis.color = isLight ? '#64748b' : '#64748b';
                    parsed.layout.yaxis.color = isLight ? '#64748b' : '#64748b';
                    parsed.layout.plot_bgcolor = isLight ? 'rgba(248,250,252,0.8)' : 'rgba(10,14,20,0.6)';
                    
                    Plotly.newPlot(chartId, parsed.data, parsed.layout, { responsive: true, displayModeBar: false });
                    scrollBottom();
                } catch(e) {
                    console.error('Chart render error:', e);
                }
            }, 50); // The 50ms delay is the magic bullet
        } else {
            scrollBottom();
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text  = input.value.trim();
        if (!text) return;
        input.value = '';

        const ws = document.getElementById('welcome-screen');
        if (ws) ws.remove();

        const userEl = document.createElement('div');
        userEl.className = 'msg user-msg';
        userEl.textContent = text;
        document.getElementById('chat-box').appendChild(userEl);

        const typingId = 'typ-' + Date.now();
        const typingEl = document.createElement('div');
        typingEl.id = typingId;
        typingEl.className = 'msg bot-row';
        typingEl.innerHTML = `
            <div class="bot-avatar">TB</div>
            <div class="bot-content">
                <div class="bot-name">Tuning Bot</div>
                <div class="loader-row">
                    <div class="skel"></div>
                    <div class="skel"></div>
                    <div class="skel"></div>
                </div>
            </div>`;
        document.getElementById('chat-box').appendChild(typingEl);
        scrollBottom();

        try {
            const res  = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            document.getElementById(typingId)?.remove();
            
            // The NLP edge interceptor is working perfectly, pass its output to the new render function
            renderBotMsg(data.reply, data.options || [], data.chart || null);
        } catch(e) {
            document.getElementById(typingId)?.remove();
            renderBotMsg(
                '⚠️ <strong>Connection failed.</strong> (SORRY FOR THE INTERUPTION )The server may be spinning up. Please wait 30 seconds and try again.',
                [], null
            );
        }
    }

    function scrollBottom() {
        const box = document.getElementById('chat-box');
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
