<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuning Bot</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        /* Modern LLM Color Palette */
        :root {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --bg-input: #2f2f2f;
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --accent: #10a37f; /* AI Green */
            --accent-hover: #1a7f64;
            --user-bubble: #2f2f2f;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR (Sleek & Minimal) */
        #sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .sidebar-header {
            padding: 20px;
            font-size: 1.2em;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .new-chat-btn {
            margin: 0 15px 15px 15px;
            padding: 12px;
            background-color: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s ease;
            text-align: left;
        }
        .new-chat-btn:hover {
            background-color: rgba(255,255,255,0.05);
        }
        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }
        .history-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }
        .history-item:hover {
            background-color: rgba(255,255,255,0.05);
            color: white;
        }

        /* MAIN CHAT AREA */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        #chat-box {
            flex: 1;
            padding: 40px 20%; /* Centers the chat like ChatGPT */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
            padding-bottom: 120px; /* Space for the floating input */
        }

        /* MESSAGE ANIMATIONS & STYLING */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-container {
            display: flex;
            flex-direction: column;
            animation: slideUp 0.4s ease-out forwards;
            line-height: 1.6;
            font-size: 1rem;
        }

        .user-msg {
            align-self: flex-end;
            background-color: var(--user-bubble);
            padding: 12px 20px;
            border-radius: 18px;
            max-width: 80%;
        }

        .bot-msg {
            align-self: flex-start;
            max-width: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .bot-label {
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* THE FLOATING PROMPT BAR */
        .input-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 800px;
            background-color: var(--bg-input);
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            padding: 5px 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        input[type="text"]::placeholder {
            color: #888;
        }

        button.send {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button.send:hover {
            background-color: var(--accent-hover);
        }

        /* TYPING INDICATOR */
        .typing-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: white; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 white, .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        ⚙️ Tuning Bot
    </div>
    <button class="new-chat-btn" onclick="startNewChat()">+ New Tuning Session</button>
    <div id="history-list"></div>
</div>

<div id="main">
    <div id="chat-box"></div>
    
    <div class="input-container">
        <input type="text" id="chat-input" placeholder="Message Tuning Bot... (e.g., Km=2, Tm=10, Tau=2)" onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send" onclick="sendMessage()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    let sessions = JSON.parse(localStorage.getItem("slm_sessions")) || [];
    let currentId = null;

    window.onload = () => {
        renderSidebar();
        if (sessions.length > 0) {
            loadSession(sessions[0].id);
        } else {
            startNewChat();
        }
    };

    function startNewChat() {
        currentId = Date.now();
        sessions.unshift({ id: currentId, title: "New Tuning Session", html: `<div class="msg-container bot-msg"><div class="bot-label">⚙️ Tuning Bot</div><div>Hello! I am ready to calculate tuning parameters. Provide your Km, Tm, and Tau.</div></div>` });
        saveData();
        renderSidebar();
        loadSession(currentId);
        fetch('https://process-control-project.onrender.com/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: "reset"}) });
    }

    function loadSession(id) {
        currentId = id;
        const session = sessions.find(s => s.id === id);
        document.getElementById('chat-box').innerHTML = session.html;
        scrollToBottom();
    }

    function renderSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        sessions.forEach(s => {
            let div = document.createElement('div');
            div.className = "history-item";
            div.innerText = s.title;
            div.onclick = () => loadSession(s.id);
            list.appendChild(div);
        });
    }

    function saveData() {
        const session = sessions.find(s => s.id === currentId);
        if (session) {
            session.html = document.getElementById('chat-box').innerHTML;
            localStorage.setItem("slm_sessions", JSON.stringify(sessions));
        }
    }

    function updateTitle(userText) {
        const session = sessions.find(s => s.id === currentId);
        if (session.title === "New Tuning Session") {
            session.title = userText.substring(0, 25) + "...";
            renderSidebar();
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        updateTitle(text);
        input.value = '';

        const chatBox = document.getElementById('chat-box');
        
        // Add User Message
        chatBox.insertAdjacentHTML('beforeend', `<div class="msg-container user-msg">${text}</div>`);
        
        // Add Loading Indicator
        const tempId = "typ-" + Date.now();
        chatBox.insertAdjacentHTML('beforeend', `<div class="msg-container bot-msg" id="${tempId}"><div class="bot-label">⚙️ Tuning Bot</div><div class="typing-dots">Analyzing</div></div>`);
        scrollToBottom();

        try {
            const res = await fetch('https://process-control-project.onrender.com/api/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            
            document.getElementById(tempId).remove();
            
            // Add Bot Reply
            if(data.reply) {
                chatBox.insertAdjacentHTML('beforeend', `<div class="msg-container bot-msg"><div class="bot-label">⚙️ Tuning Bot</div><div>${data.reply.replace(/\n/g, "<br>")}</div></div>`);
            }
            
            // Draw Chart with Dark Mode Forcing
            if(data.chart) {
                const cId = 'chart-' + Date.now();
                chatBox.insertAdjacentHTML('beforeend', `<div id="${cId}" style="width:100%; height:350px; margin-top:15px; border-radius:10px; overflow:hidden;"></div>`);
                
                let chartData = JSON.parse(data.chart);
                // Force Plotly into Dark Mode to match the UI!
                chartData.layout.paper_bgcolor = 'transparent';
                chartData.layout.plot_bgcolor = 'transparent';
                chartData.layout.font = { color: '#ececec' };
                chartData.layout.xaxis.gridcolor = '#444';
                chartData.layout.yaxis.gridcolor = '#444';
                
                Plotly.newPlot(cId, chartData.data, chartData.layout);
            }
        } catch(e) {
            document.getElementById(tempId).remove();
            chatBox.insertAdjacentHTML('beforeend', `<div class="msg-container bot-msg"><div class="bot-label" style="color:#ff4444;">⚠️ System Error</div><div style="color:#ff4444;">Could not connect to the Render API. Please try again.</div></div>`);
        }
        
        scrollToBottom();
        saveData();
    }

    function scrollToBottom() {
        const b = document.getElementById('chat-box');
        b.scrollTop = b.scrollHeight;
    }
</script>

</body>
</html>
